name: Weekly package update

on:
  schedule:
    - cron: "0 5 * * 0" # Each Sunday 5am
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-delimited list of packages to update. Leave empty to update all packages."
        type: string
      target_branch:
        type: string
        default: master

jobs:
  update-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper "!gh auth git-credential"

      - name: Update packages
        id: update
        run: .github/scripts/update-packages.sh
        env:
          PACKAGES: ${{ inputs.packages || '--all' }}
          TARGET_BRANCH: ${{ inputs.target_branch || 'master' }}

      - name: Create list of valid packages
        run: |
          nix eval '.#packages.x86_64-linux' --apply 'builtins.attrNames' --json \
            > /tmp/valid-packages.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: update-all.log
          path: /tmp/update-all.log

      - name: Create one PR per updated package
        run: .github/scripts/create-prs.sh
        env:
          # Token owner: https://github.com/imincik
          # Permissions:
          #   * Read access to metadata
          #   * Read and Write access to code and pull requests
          GH_TOKEN: ${{ secrets.FLAKE_UPDATE }}
          TARGET_BRANCH: ${{ inputs.target_branch || 'master' }}
