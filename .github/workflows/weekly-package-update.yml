name: Weekly package update

on:
  schedule:
    - cron: "0 5 * * 0" # Each Sunday 5am
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-delimited list of packages to update. Leave empty to update all packages."
        type: string
      target_branch:
        type: string
        default: master

jobs:
  update-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper "!gh auth git-credential"

      - name: Update packages
        id: update
        run: |
          if [[ "$PACKAGES" = "" ]]; then
            UPDATE_ARGS="--all"
          else
            UPDATE_ARGS="$PACKAGES"
          fi

          git checkout "$TARGET_BRANCH"
          nix develop --command forge-update "$UPDATE_ARGS" --commit 2>&1 | tee /tmp/update-all.log

          # Save commit-list of updated packages
          git log --reverse origin/"$TARGET_BRANCH"..HEAD --format="%H %s" \
            | grep "recipes(" \
            > /tmp/commits.txt || true
        env:
          PACKAGES: ${{ inputs.packages }}
          TARGET_BRANCH: ${{ inputs.target_branch }}

      - name: Create list of valid packages
        run: |
          nix eval '.#packages.x86_64-linux' --apply 'builtins.attrNames' --json \
            > /tmp/valid-packages.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: update-all.log
          path: /tmp/update-all.log

      - name: Create one PR per updated package
        run: |
          if [[ ! -s /tmp/commits.txt ]]; then
            echo "No packages need updating."
            exit 0
          fi

          while IFS=' ' read -r sha msg; do
            pkg=""; version_diff=""

            if [[ "$msg" =~ recipes\((.*)\):.(.*) ]]; then
                pkg="${BASH_REMATCH[1]}"
                version_diff="${BASH_REMATCH[2]}"
            fi

            if ! jq -e --arg pkg "$pkg" 'any(. == $pkg)' /tmp/valid-packages.json > /dev/null; then
              echo "$pkg is not a valid forge package, skipping."
              continue
            fi

            branch="update/$pkg"

            echo "Creating PR for $pkg ($version_diff) on $branch"
            git checkout -b "$branch" origin/"$TARGET_BRANCH"

            if ! git cherry-pick "$sha"; then
              echo "Cherry-pick failed for $pkg, skipping."
              git cherry-pick --abort
              continue
            fi

            if ! git push --force origin "$branch"; then
              echo "Push failed for $pkg, skipping."
              continue
            fi

            PR_BODY="
            ## Package update

            Update \`$pkg\` to the latest version.

            *PR auto-generated by the [weekly package-update workflow](../actions/workflows/weekly-package-update.yml).*
            "

            EXISTING_PR=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')

            if [[ -n "$EXISTING_PR" ]]; then
              echo "PR already exists (#$EXISTING_PR) for $pkg. Updating title/body."
              gh pr edit "$EXISTING_PR" \
                --title "$msg" \
                --body "$PR_BODY" \
                2>&1
              continue
            fi

            gh pr create \
              --title "$msg" \
              --body "$PR_BODY" \
              --head "$branch" \
              --base "$TARGET_BRANCH" \
              --label automated \
              2>&1

          done < /tmp/commits.txt
        env:
          # Token owner: https://github.com/imincik
          # Permissions:
          #   * Read access to metadata
          #   * Read and Write access to code and pull requests
          GH_TOKEN: ${{ secrets.FLAKE_UPDATE }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
